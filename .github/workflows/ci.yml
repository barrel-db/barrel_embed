name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  erlang-test:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y cmake

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        run: rebar3 eunit

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e "priv[dev]" --python .venv/bin/python

      - name: Run tests
        run: |
          source .venv/bin/activate
          cd priv && pytest tests/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake python3 python3-venv python3-pip curl

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          $HOME/.local/bin/uv venv .venv
          $HOME/.local/bin/uv pip install -e "priv[sentence-transformers]" --python .venv/bin/python

      - name: Run integration test
        run: |
          rebar3 compile
          rebar3 shell --eval '
            VenvPath = filename:absname(".venv"),
            io:format("Testing venv at: ~s~n", [VenvPath]),
            {ok, State} = barrel_embed:init(#{
              embedder => {local, #{venv => VenvPath, timeout => 60000}}
            }),
            io:format("Initialized with state~n"),
            {ok, Embedding} = barrel_embed:embed(<<"hello world">>, State),
            io:format("Embedding dimension: ~p~n", [length(Embedding)]),
            true = length(Embedding) > 0,
            io:format("SUCCESS: venv integration test passed~n"),
            init:stop(0)
          '

  dialyzer:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y cmake

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: dialyzer-${{ hashFiles('rebar.lock') }}

      - name: Dialyzer
        run: rebar3 dialyzer

  xref:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y cmake

      - name: Xref
        run: rebar3 xref
